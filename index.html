<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense &amp; Budget Visualizer</title>

  <!-- Flash-prevention: must appear BEFORE the CSS link tag -->
  <script>
    (function () {
      var t = localStorage.getItem('expense_visualizer_theme');
      if (t === 'dark' || t === 'light') {
        document.documentElement.setAttribute('data-theme', t);
      }
    })();
  </script>

  <!-- Google Fonts: Nunito -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- App stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Unsupported browser banner (hidden by default) -->
  <div id="compat-warning" style="display:none" role="alert" aria-live="assertive">
    <p>Your browser does not support the features required by this app. Please upgrade to a modern browser (Chrome, Firefox, Edge, or Safari).</p>
  </div>

  <header>
    <h1>Expense &amp; Budget Visualizer</h1>
    <button id="theme-toggle" aria-label="Switch to dark mode">🌙</button>
  </header>

  <main>

    <!-- Balance Display + Spending Limit controls -->
    <section id="balance-section" aria-labelledby="balance-heading">
      <h2 id="balance-heading">Total Spending</h2>
      <p id="balance-display">$0.00</p>

      <div class="spending-limit-controls">
        <label for="limit-input">Spending Limit</label>
        <input
          type="number"
          id="limit-input"
          name="limit"
          min="0.01"
          max="999999999.99"
          step="0.01"
          placeholder="e.g. 500.00"
          aria-describedby="limit-error"
        >
        <span class="error-msg" id="limit-error" aria-live="polite"></span>
        <button type="button" id="set-limit-btn">Set Limit</button>
        <button type="button" id="clear-limit-btn">Clear</button>
      </div>
    </section>

    <!-- Input Form + Category Manager -->
    <section id="form-section" aria-labelledby="form-heading">
      <h2 id="form-heading">Add Expense</h2>

      <!-- Global form error (e.g. storage unavailable) -->
      <span class="error-msg" id="form-global-error" aria-live="polite"></span>

      <form id="expense-form" novalidate>
        <div class="form-field">
          <label for="name-input">Item Name</label>
          <input
            type="text"
            id="name-input"
            name="name"
            maxlength="100"
            placeholder="e.g. Coffee"
            autocomplete="off"
            aria-describedby="name-error"
          >
          <span class="error-msg" id="name-error" aria-live="polite"></span>
        </div>

        <div class="form-field">
          <label for="amount-input">Amount ($)</label>
          <input
            type="number"
            id="amount-input"
            name="amount"
            min="0.01"
            max="999999999.99"
            step="0.01"
            placeholder="e.g. 3.50"
            aria-describedby="amount-error"
          >
          <span class="error-msg" id="amount-error" aria-live="polite"></span>
        </div>

        <div class="form-field">
          <label for="category-select">Category</label>
          <select id="category-select" name="category" aria-describedby="category-error">
            <option value="">-- Select a category --</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
          <span class="error-msg" id="category-error" aria-live="polite"></span>
        </div>

        <button type="submit" id="add-expense-btn">Add Expense</button>
      </form>

      <!-- Category Manager (inline, below form) -->
      <div id="category-manager">
        <h3>Manage Categories</h3>

        <div class="form-field">
          <label for="new-category-input">New Category</label>
          <input
            type="text"
            id="new-category-input"
            name="new-category"
            maxlength="50"
            placeholder="e.g. Health"
            autocomplete="off"
            aria-describedby="new-category-error"
          >
          <span class="error-msg" id="new-category-error" aria-live="polite"></span>
          <button type="button" id="add-category-btn">Add Category</button>
        </div>

        <ul id="custom-category-list" aria-label="Custom categories">
          <!-- Custom category items rendered by JS -->
        </ul>
      </div>
    </section>

    <!-- Monthly Summary -->
    <section id="summary-section" aria-labelledby="summary-heading">
      <h2 id="summary-heading">Monthly Summary</h2>

      <div class="month-nav" role="navigation" aria-label="Month navigation">
        <button type="button" id="prev-month-btn" aria-label="Previous month">&#8592; Prev</button>
        <span id="month-label" aria-live="polite" aria-atomic="true"></span>
        <button type="button" id="next-month-btn" aria-label="Next month">Next &#8594;</button>
      </div>

      <div id="monthly-stats">
        <p id="monthly-total"></p>
        <p id="monthly-count"></p>
      </div>

      <ul id="monthly-transaction-list" aria-label="Transactions for selected month">
        <!-- Monthly transaction items rendered by JS -->
      </ul>
    </section>

    <!-- Transaction List (all transactions) -->
    <section id="list-section" aria-labelledby="list-heading">
      <h2 id="list-heading">All Transactions</h2>

      <div class="sort-controls">
        <label for="sort-control">Sort by</label>
        <select id="sort-control" aria-label="Sort transactions">
          <option value="date-desc">Date (Newest First)</option>
          <option value="date-asc">Date (Oldest First)</option>
          <option value="amount-desc">Amount (High → Low)</option>
          <option value="amount-asc">Amount (Low → High)</option>
          <option value="category-asc">Category (A → Z)</option>
          <option value="category-desc">Category (Z → A)</option>
        </select>
      </div>

      <!-- Global list error (e.g. storage unavailable on delete) -->
      <span class="error-msg" id="list-global-error" aria-live="polite"></span>

      <ul id="transaction-list" aria-label="Transaction list">
        <!-- Transaction items rendered by JS -->
      </ul>
    </section>

    <!-- Chart -->
    <section id="chart-section" aria-labelledby="chart-heading">
      <h2 id="chart-heading">Spending by Category</h2>
      <div id="chart-container">
        <canvas id="spending-chart" aria-label="Spending distribution pie chart" role="img"></canvas>
      </div>
    </section>

  </main>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- App script -->
  <script src="js/app.js"></script>

</body>
</html>
